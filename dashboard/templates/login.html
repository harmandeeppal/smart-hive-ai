<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hive AI - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color, #0d1117);
        }
        .login-card {
            background: var(--card-bg, #161b22);
            border: 1px solid var(--border-color, #30363d);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.4rem;
            margin: 0 0 0.5rem;
            color: var(--text-primary, #e6edf3);
        }
        .login-card p {
            font-size: 0.85rem;
            color: var(--text-secondary, #8b949e);
            margin: 0 0 1.5rem;
        }
        .login-card input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.9rem;
            font-size: 1rem;
            background: var(--input-bg, #0d1117);
            border: 1px solid var(--border-color, #30363d);
            border-radius: 6px;
            color: var(--text-primary, #e6edf3);
            box-sizing: border-box;
            margin-bottom: 1rem;
            outline: none;
        }
        .login-card input[type="password"]:focus {
            border-color: #58a6ff;
        }
        .login-card button {
            width: 100%;
            padding: 0.65rem;
            font-size: 1rem;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: #2ea043;
        }
        .error-msg {
            background: rgba(248,81,73,0.1);
            border: 1px solid #f85149;
            border-radius: 6px;
            color: #f85149;
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            margin-bottom: 1rem;
        }
        .bee-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="bee-icon">&#x1F41D;</span>
        <h1>Smart Hive AI</h1>
        <p>Enter the demo password to access the dashboard</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="password" name="password" placeholder="Password" autofocus required>
            <button type="submit">Enter Dashboard</button>
        </form>
    </div>
</body>
</html>
