# docker-compose.yml (Corrected and Enhanced)

services:
  edge-app:
    build:
      context: .
      dockerfile: Dockerfile.edge
    image: smart-hive-edge:latest
    container_name: smart-hive-edge
    restart: unless-stopped
    networks:
      - smart-hive-net
    ports:
      - "5001:5001"
    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro
    devices:
      # I2C sensors (BME280, LIS3DH)
      - "/dev/i2c-1:/dev/i2c-1"
      # GPIO access
      - "/dev/gpiomem:/dev/gpiomem"
      # SPI devices (if needed)
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      # USB Camera (add video0, video1 for compatibility)
      - "/dev/video0:/dev/video0"
      # USB Microphone/Audio
      - "/dev/snd:/dev/snd"
    privileged: true

  smart-hive-ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    image: smart-hive-ml:latest
    container_name: smart-hive-ml
    restart: unless-stopped
    networks:
      - smart-hive-net
    volumes:
      - ./models:/app/models:ro
      - ./ml_vision_model:/app/ml_vision_model:ro
      - ./ml_audio_model:/app/ml_audio_model:ro
    environment:
      - MQTT_BROKER=mosquitto
      - AWS_REGION=ap-southeast-2
      - PYTHONUNBUFFERED=1
    devices:
      # USB Camera (for YOLO inference)
      - "/dev/video0:/dev/video0"
      # USB Microphone (for audio classification)
      - "/dev/snd:/dev/snd"
    depends_on:
      - edge-app
    # Resource limits for Raspberry Pi
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: smart-hive-dashboard:latest
    container_name: smart-hive-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - .:/app

    networks:
      - smart-hive-net
    # This ensures the dashboard starts after the edge app is ready
    depends_on:
      - edge-app
      - smart-hive-ml


networks:
  smart-hive-net:
    driver: bridge
