# docker-compose.yml - Smart Hive AI
# Separated Vision and Audio microservices

version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    networks:
      - smart-hive-net
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  edge-app:
    build:
      context: .
      dockerfile: Dockerfile.edge
    image: smart-hive-edge:latest
    container_name: smart-hive-edge
    restart: unless-stopped
    networks:
      - smart-hive-net
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/video0:/dev/video0"
      - "/dev/snd:/dev/snd"
    privileged: true
    depends_on:
      - mosquitto

  smart-hive-vision:
    build:
      context: .
      dockerfile: Dockerfile.vision
    image: smart-hive-vision:latest
    container_name: smart-hive-vision
    restart: unless-stopped
    networks:
      - smart-hive-net
    volumes:
      - ./models:/app/models:ro
      - ./ml_vision_model:/app/ml_vision_model:ro
    environment:
      - MQTT_BROKER=mosquitto
    devices:
      - "/dev/video0:/dev/video0"
    depends_on:
      - mosquitto

  smart-hive-audio:
    build:
      context: .
      dockerfile: Dockerfile.audio
    image: smart-hive-audio:latest
    container_name: smart-hive-audio
    restart: unless-stopped
    networks:
      - smart-hive-net
    volumes:
      - ./models:/app/models:ro
      - ./ml_audio_model:/app/ml_audio_model:ro
    environment:
      - MQTT_BROKER=mosquitto
    devices:
      - "/dev/snd:/dev/snd"
    depends_on:
      - mosquitto

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: smart-hive-dashboard:latest
    container_name: smart-hive-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - smart-hive-net
    environment:
      - MQTT_BROKER=mosquitto
    depends_on:
      - mosquitto

networks:
  smart-hive-net:
    driver: bridge
