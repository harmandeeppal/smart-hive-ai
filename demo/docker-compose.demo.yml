# docker-compose.demo.yml
# Smart Hive AI — Local Demo Stack (no hardware required)
#
# Replaces the Raspberry Pi edge app with the simulator.
# All services use DEMO_MODE — no sensors, no AWS, no microphone required.
#
# Usage (from project root):
#   docker compose -f demo/docker-compose.demo.yml up --build
#
# Or use the one-click bootstrap:
#   bash demo/bootstrap.sh        (Linux/Mac)
#   pwsh demo/bootstrap.ps1       (Windows)

version: '3.8'

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: demo-mosquitto
    networks:
      - demo-net
    ports:
      - "1883:1883"
    volumes:
      - ../mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  simulator:
    build:
      context: ..
      dockerfile: demo/Dockerfile.simulator
    image: smart-hive-simulator:latest
    container_name: demo-simulator
    networks:
      - demo-net
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - TELEMETRY_INTERVAL=5
      - FRAME_INTERVAL=3
    depends_on:
      - mosquitto
    restart: unless-stopped

  audio:
    build:
      context: ..
      dockerfile: Dockerfile.audio
    image: smart-hive-audio:latest
    container_name: demo-audio
    networks:
      - demo-net
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - DEMO_MODE=true
    volumes:
      # Mount local models dir so download_models.py skips the HF download locally
      - ../models:/app/models:ro
    depends_on:
      - mosquitto
    restart: unless-stopped

  vision:
    build:
      context: ..
      dockerfile: Dockerfile.vision
    image: smart-hive-vision:latest
    container_name: demo-vision
    networks:
      - demo-net
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - VISION_CONFIDENCE_THRESHOLD=0.35
    volumes:
      # Mount local models dir so download_models.py skips the HF download locally
      - ../models:/app/models:ro
    depends_on:
      - mosquitto
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile.dashboard
    image: smart-hive-dashboard:latest
    container_name: demo-dashboard
    networks:
      - demo-net
    ports:
      - "5000:5000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - DEMO_MODE=true
      - SECRET_KEY=${SECRET_KEY:-demo-secret-key-change-in-production}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-smarthive}
    depends_on:
      - mosquitto
    restart: unless-stopped

networks:
  demo-net:
    driver: bridge
