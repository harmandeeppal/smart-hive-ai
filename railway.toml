# railway.toml — Smart Hive AI Dashboard
#
# Railway reads this file for the DASHBOARD service (the public entry point).
# All other services (mosquitto, simulator, ml-vision, ml-audio) are added
# in the Railway dashboard pointing to this same repo with their own Dockerfile.
# Full setup guide: docs/deployment/railway.md

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.dashboard"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "always"
