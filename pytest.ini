[pytest]
# Pytest configuration for Smart Hive AI

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test markers
markers =
    unit: Unit tests (fast, no hardware)
    integration: Integration tests (may be slower)
    mqtt: MQTT communication tests
    ml: Machine learning tests
    hardware: Tests requiring hardware (skipped on laptop)
