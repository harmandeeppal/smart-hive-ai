# Mosquitto Configuration for Smart Hive AI
# Works for both local Docker and Railway cloud deployment

# Listen on all interfaces, port 1883
listener 1883
protocol mqtt

# Allow anonymous connections (no auth required in demo mode)
allow_anonymous true

# Persistence (disabled for Railway — ephemeral filesystem)
persistence false

# Log to stdout only (Railway captures this in service logs)
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true
