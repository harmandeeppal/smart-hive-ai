# Mosquitto Configuration for Smart Hive AI
# Allow connections from all interfaces (Docker containers need this)

# Listen on all interfaces, port 1883
listener 1883
protocol mqtt

# Allow anonymous connections (for local/docker use)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Log settings
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
